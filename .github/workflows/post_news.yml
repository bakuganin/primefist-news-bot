name: Post Combat Sports News

on:
  push:
    paths-ignore:
      - 'posted.json'
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TELEGRAM_DISCUSSION_CHAT_ID: ${{ secrets.TELEGRAM_DISCUSSION_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python primefist_bot.py

      - name: Commit and push posted.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update posted.json [skip ci]"
          file_pattern: 'posted.json'

